<!doctype html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Trash Dashboard</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #637083;
      --line: #dfe5ee;
      --green: #16835f;
      --amber: #ba6b00;
      --red: #c73535;
      --blue: #2357c6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(1100px, calc(100% - 28px));
      margin: 24px auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(23, 32, 42, 0.05);
    }

    .panel.wide {
      grid-column: 1 / -1;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: 700;
      color: #fff;
      background: var(--green);
    }

    .status.full,
    .status.fallen,
    .status.off {
      background: var(--red);
    }

    button {
      border: 0;
      border-radius: 6px;
      min-height: 40px;
      padding: 9px 13px;
      font-weight: 700;
      color: #fff;
      background: var(--blue);
      cursor: pointer;
    }

    button.secondary {
      background: #4b5b70;
    }

    button.danger {
      background: var(--red);
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    #chart {
      width: 100%;
      height: 320px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.55;
      font-family: inherit;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Smart Trash Dashboard</h1>
        <div class="meta" id="lastUpdated">Loading...</div>
      </div>
      <div class="actions">
        <button id="alarmButton" onclick="toggleAlarm()">Alarm</button>
        <button class="secondary" onclick="loadData()">Refresh</button>
        <button onclick="analyze()">AI วิเคราะห์</button>
      </div>
    </header>

    <section class="grid">
      <div class="panel">
        <div class="label">ระยะของขยะ(cm)</div>
        <div class="value" id="wasteHeight">-</div>
      </div>

      <div class="panel">
        <div class="label">สถานะขยะ</div>
        <div id="wasteStatus" class="status">-</div>
      </div>

      <div class="panel">
        <div class="label">สถานะถังขยะ</div>
        <div id="binStatus" class="status">-</div>
      </div>

      <div class="panel">
        <div class="label">สถานะระบบ</div>
        <div id="systemStatus" class="status">-</div>
      </div>

      <div class="panel">
        <div class="label">Buzzer / Alarm ทำงาน</div>
        <div class="value" id="alarmActive">-</div>
      </div>

      <div class="panel">
        <div class="label">จำนวนครั้งที่เต็ม</div>
        <div class="value" id="fullCount">-</div>
      </div>

      <div class="panel wide">
        <div class="label">กราฟจำนวนครั้งที่เต็มในแต่ละช่วงเวลา</div>
        <div id="chart"></div>
      </div>

      <div class="panel wide">
        <div class="label">ผลวิเคราะห์จาก AI</div>
        <pre id="analysis">กดปุ่ม AI วิเคราะห์เพื่อดูคำแนะนำ</pre>
      </div>
    </section>
  </main>

  <script>
    google.charts.load('current', { packages: ['corechart'] });

    let alarmEnabled = true;

    function apiCall(functionName, ...args) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          [functionName](...args);
      });
    }

    function setStatus(id, text) {
      const el = document.getElementById(id);
      el.textContent = text || '-';
      el.className = 'status';

      if (text === 'เต็มแล้ว') el.classList.add('full');
      if (text === 'ล้ม') el.classList.add('fallen');
      if (text === 'ปิด') el.classList.add('off');
    }

    function renderLatest(data) {
        if (!data.ok) return;

        const latest = data.latest;
        alarmEnabled = data.alarmEnabled;

        document.getElementById('wasteHeight').textContent = latest.wasteHeightCm;
        document.getElementById('alarmActive').textContent = latest.alarm;
        document.getElementById('fullCount').textContent = data.summary.fullCount;
        document.getElementById('lastUpdated').textContent = `อัปเดตล่าสุด: ${latest.timestamp}`;

        setStatus('wasteStatus', latest.wasteStatus);
        setStatus('binStatus', latest.binStatus);
        setStatus('systemStatus', latest.systemStatus);
        updateAlarmButton();
    }

    function loadLatestData() {
      apiCall('getLatestDashboardData').then((data) => {
        renderLatest(data);
      }).catch((error) => {
        document.getElementById('lastUpdated').textContent = error.message;
      });
    }

    function loadData() {
      apiCall('getDashboardData').then((data) => {
        renderLatest(data);
        document.getElementById('fullCount').textContent = data.summary.fullCount;
        drawChart(data.chart);
      }).catch((error) => {
        document.getElementById('lastUpdated').textContent = error.message;
      });
    }

    function updateAlarmButton() {
      const button = document.getElementById('alarmButton');
      button.textContent = alarmEnabled ? 'ปิด Alarm' : 'เปิด Alarm';
      button.classList.toggle('danger', alarmEnabled);
    }

    function toggleAlarm() {
      const button = document.getElementById('alarmButton');
      button.disabled = true;

      apiCall('setAlarmFromWeb', !alarmEnabled)
        .then((data) => {
          if (data.ok) {
            alarmEnabled = data.alarmEnabled;
            updateAlarmButton();
          }
        })
        .finally(() => {
          button.disabled = false;
        });
    }

    function analyze() {
      const el = document.getElementById('analysis');
      el.textContent = 'กำลังวิเคราะห์...';

      apiCall('analyzeFromWeb')
        .then((data) => {
          el.textContent = data.ok ? data.analysis : data.error;
        })
        .catch((error) => {
          el.textContent = error.message;
        });
    }

    function drawChart(rows) {
      google.charts.setOnLoadCallback(() => {
        const data = new google.visualization.DataTable();
        data.addColumn('string', 'ช่วงเวลา');
        data.addColumn('number', 'จำนวนครั้งที่เต็ม');
        (rows || []).forEach((row) => data.addRow([row.label, row.count]));

        const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
        chart.draw(data, {
          legend: { position: 'none' },
          colors: ['#2357c6'],
          chartArea: { left: 48, top: 24, width: '88%', height: '72%' },
          vAxis: { minValue: 0, format: '0' },
        });
      });
    }

    loadData();
    setInterval(loadLatestData, 2000);
    setInterval(loadData, 15000);
  </script>
</body>
</html>
